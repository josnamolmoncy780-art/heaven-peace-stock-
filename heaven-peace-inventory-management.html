<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heaven Peace - Billing System</title>
    <style>
        /* നിങ്ങളുടെ പ്രീമിയം ലുക്ക് നിലനിർത്തിക്കൊണ്ടുള്ള സ്റ്റൈൽ */
        .bill-summary { background: #fdfdfd; padding: 20px; border: 1px solid #ddd; }
        .qr-section { margin-top: 20px; text-align: center; }
        .qr-section img { width: 150px; }
    </style>
</head>
<body>

<!-- Billing Section -->
<div id="billing-tab" class="panel active">
    <h2>Quick Invoice</h2>
    
    <!-- Discount Input -->
    <div class="form-group" style="margin: 15px 0;">
        <label>Discount (%):</label>
        <input type="number" id="bill-discount" value="0" oninput="renderBillTable()">
    </div>

    <!-- Billing Table -->
    <table>
        <thead>
            <tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr>
        </thead>
        <tbody id="bill-items-body"></tbody>
    </table>

    <div class="bill-summary">
        <div class="summary-row"><span>Grand Total:</span> <span id="bill-grand-total">0.00</span></div>
        <button onclick="printInvoice()">Print & Complete Bill</button>
    </div>
</div>

<!-- Print Area with QR Code -->
<div id="print-area" style="display: none;">
    <h2>HEAVEN PEACE</h2>
    <div id="print-table-body"></div>
    <p>Grand Total (after discount): ₹<span id="print-grand-total">0.00</span></p>
    
    <!-- QR Code Section -->
    <div class="qr-section">
        <p>Scan to Pay:</p>
        <img src="https://i.ibb.co/YOUR_IMAGE_LINK/image.png" alt="UPI QR">
        <p>UPI ID: josnamolmoncy1818@oksbi</p>
    </div>
</div>

<script>
    function renderBillTable() {
        // നിലവിലെ ലോജിക്...
        let discount = parseFloat(document.getElementById('bill-discount').value) || 0;
        let total = /* കണക്കുകൂട്ടിയ തുക */;
        let finalTotal = total - (total * (discount / 100));
        document.getElementById('bill-grand-total').innerText = finalTotal.toFixed(2);
    }

    function printInvoice() {
        document.getElementById('print-grand-total').innerText = document.getElementById('bill-grand-total').innerText;
        window.print();
    }
</script>

</body>
</html>
