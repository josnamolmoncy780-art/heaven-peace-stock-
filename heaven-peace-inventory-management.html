<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heaven Peace - Inventory & Barcode Manager</title>
    <!-- JsBarcode Library for Free Barcode Generation -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary: #1e293b;
            --accent: #0f766e;
            --light: #f8fafc;
            --text: #0f172a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e2e8f0; color: var(--text); padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #cbd5e1; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--primary); font-size: 24px; }
        .auth-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .main-content { display: none; }
        .active { display: block; }
        
        /* Form Styling */
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; background: var(--light); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #cbd5e1; }
        input, select { padding: 10px; border: 1px solid #94a3b8; border-radius: 6px; font-size: 14px; width: 100%; }
        button.add-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button.add-btn:hover { background: #0d5e58; }

        /* Actions Bar */
        .actions-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-sec { background: #64748b; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }

        /* Table Styling */
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 12px; border-bottom: 1px solid #cbd5e1; }
        th { background-color: var(--primary); color: white; }
        tr:hover { background-color: #f1f5f9; }
        
        /* Barcode Area */
        .barcode-container { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .barcode-svg { max-width: 120px; height: auto; }
        .print-btn { background: #3b82f6; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 4px; }

        /* Login Modal */
        .login-box { max-width: 350px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .login-box h2 { margin-bottom: 20px; color: var(--primary); }
        .login-box input { margin-bottom: 15px; text-align: center; }

        /* Print Specific Styles */
        @media print {
            body * { visibility: hidden; }
            .print-section, .print-section * { visibility: visible; }
            .print-section { position: absolute; left: 0; top: 0; text-align: center; width: 100%; }
            .print-btn { display: none; }
        }
    </style>
</head>
<body>

    <!-- LOGIN PAGE -->
    <div id="login-page" class="login-box active">
        <h2>Heaven Peace Login</h2>
        <input type="password" id="pin-input" placeholder="Enter 4-Digit PIN" maxlength="4">
        <button class="add-btn" style="width:100%" onclick="checkLogin()">Login</button>
    </div>

    <!-- MAIN INTERFACE -->
    <div id="main-interface" class="container main-content">
        <header>
            <h1>Heaven Peace Inventory & Barcode</h1>
            <button class="auth-btn" onclick="logout()">Logout</button>
        </header>

        <!-- Backup/Restore Buttons -->
        <div class="actions-bar">
            <button class="btn-sec" onclick="exportData()">📥 Backup Data</button>
            <button class="btn-sec" onclick="document.getElementById('import-file').click()">📤 Restore Data</button>
            <input type="file" id="import-file" style="display:none" onchange="importData(event)">
        </div>

        <!-- Add Item Form -->
        <div class="form-group">
            <input type="text" id="item-name" placeholder="Product Name (e.g., Bubble Wrap)">
            <input type="text" id="item-code" placeholder="Barcode Number/SKU (e.g., 1001)">
            <input type="number" id="item-stock" placeholder="Stock Quantity">
            <input type="number" id="item-price" placeholder="Price (₹)">
            <button class="add-btn" onclick="addItem()">Add & Generate Barcode</button>
        </div>

        <!-- Inventory List -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Product Name</th>
                        <th>Barcode Number</th>
                        <th>Barcode Preview</th>
                        <th>Stock</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    <!-- Dynamic Rows Go Here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Hidden Print Area -->
    <div id="print-area" class="print-section"></div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('hp_inventory')) || [];

        function checkLogin() {
            const pin = document.getElementById('pin-input').value;
            if(pin === '1234') {
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('main-interface').classList.add('active');
                renderInventory();
            } else {
                alert('Wrong PIN! Try again.');
                document.getElementById('pin-input').value = '';
            }
        }

        function logout() {
            document.getElementById('main-interface').classList.remove('active');
            document.getElementById('login-page').classList.add('active');
            document.getElementById('pin-input').value = '';
        }

        function addItem() {
            const name = document.getElementById('item-name').value.trim();
            let code = document.getElementById('item-code').value.trim();
            const stock = document.getElementById('item-stock').value.trim();
            const price = document.getElementById('item-price').value.trim();

            if(!name || !stock || !price) {
                alert('Please fill Product Name, Stock, and Price!');
                return;
            }

            // Auto-generate a numeric barcode if left empty
            if(!code) {
                code = Math.floor(100000 + Math.random() * 900000).toString();
            }

            const item = { id: Date.now().toString(), name, code, stock: parseInt(stock), price: parseFloat(price) };
            inventory.push(item);
            saveData();
            renderInventory();

            // Clear inputs
            document.getElementById('item-name').value = '';
            document.getElementById('item-code').value = '';
            document.getElementById('item-stock').value = '';
            document.getElementById('item-price').value = '';
        }

        function deleteItem(id) {
            if(confirm('Are you sure you want to delete this item?')) {
                inventory = inventory.filter(item => item.id !== id);
                saveData();
                renderInventory();
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';

            inventory.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${item.name}</strong></td>
                    <td>${item.code}</td>
                    <td>
                        <div class="barcode-container">
                            <svg id="barcode-${item.id}" class="barcode-svg"></svg>
                            <button class="print-btn" onclick="printSingleBarcode('${item.name}', '${item.code}')">🖨️ Print</button>
                        </div>
                    </td>
                    <td>${item.stock}</td>
                    <td>₹${item.price}</td>
                    <td><button onclick="deleteItem('${item.id}')" style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;">Delete</button></td>
                `;
                list.appendChild(tr);

                // Generate the barcode inside the SVG
                try {
                    JsBarcode(`#barcode-${item.id}`, item.code, {
                        format: "CODE128",
                        width: 2,
                        height: 40,
                        displayValue: true,
                        fontSize: 14
                    });
                } catch(e) {
                    console.error("Barcode generation failed", e);
                }
            });
        }

        function printSingleBarcode(name, code) {
            const printArea = document.getElementById('print-area');
            printArea.innerHTML = `
                <div style="padding: 20px; display: inline-block; text-align: center;">
                    <h3 style="margin-bottom: 5px; font-family: sans-serif; font-size: 16px;">${name}</h3>
                    <svg id="print-svg"></svg>
                </div>
            `;
            
            JsBarcode("#print-svg", code, {
                format: "CODE128",
                width: 2.5,
                height: 60,
                displayValue: true,
                fontSize: 16
            });

            window.print();
            printArea.innerHTML = '';
        }

        function saveData() {
            localStorage.setItem('hp_inventory', JSON.stringify(inventory));
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(inventory));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `heaven-peace-backup-${new Date().toISOString().slice(0,10)}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        inventory = imported;
                        saveData();
                        renderInventory();
                        alert('Data Restored Successfully!');
                    } else {
                        alert('Invalid backup file.');
                    }
                } catch (err) {
                    alert('Error reading file.');
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
